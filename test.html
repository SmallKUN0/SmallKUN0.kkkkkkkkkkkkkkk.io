<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>test</title></head>
<body>
<div id="result">RUNNING</div>
<iframe id="f" src="index.html" style="width:1200px;height:800px"></iframe>
<script>
const f = document.getElementById('f');
const testCode = `
  (function(){
    const logs = [];
    const log = m => logs.push(m);
    window.__testResult = 'RUNNING';
    const done = m => { window.__testResult = m + '\\n----LOGS----\\n' + logs.join('\\n'); };
    currentWorld = { name:'__test__', type:'random', created:Date.now(), placedBlocks:{}, destroyedBlocks:[],
      playerPos:{x:0,y:1.6,z:0}, playerRot:{yaw:0,pitch:0} };
    worlds.push(currentWorld);
    placedBlocks = {}; destroyedBlocks = new Set();
    player.x = 0; player.y = 1.6; player.z = 0; yaw = 0; pitch = 0;
    enterGame();
    const t0 = Date.now();
    const waitGame = setInterval(() => {
      if (isGameRunning) { clearInterval(waitGame); phase2(); }
      if (Date.now() - t0 > 60000) { clearInterval(waitGame); done('TIMEOUT game'); }
    }, 200);
    function place(x, y, z, type){
      const key = x+','+y+','+z;
      destroyedBlocks.delete(key);
      placedBlocks[key] = type;
      worldBlocks[key] = type;
      const ck = getChunkKey(x, z);
      if (!chunkBlocks[ck]) chunkBlocks[ck] = new Set();
      chunkBlocks[ck].add(key);
      activeBlocks.add(key);
      createBlockMesh(x, y, z, type);
      if (type === 'fire') { registerFire(x, y, z, key); checkPortalAt(x, y, z); }
    }
    function phase2(){
      try {
        log('game running, dimension=' + currentDimension);
        const sy = getSurfaceHeight(10, 11);
        for (let z = 10; z <= 13; z++){ place(10, sy+1, z, 'obsidian'); place(10, sy+5, z, 'obsidian'); }
        for (let y = sy+1; y <= sy+5; y++){ place(10, y, 10, 'obsidian'); place(10, y, 13, 'obsidian'); }
        log('obsidian frame built');
        // 清空框架内部（模拟玩家清理空间）
        for (let z = 11; z <= 12; z++) for (let y = sy+2; y <= sy+4; y++) {
          const ik = '10,'+y+','+z;
          const im = blockMeshes[ik];
          if (im) { scene.remove(im); delete blockMeshes[ik]; const ii = blockMeshesArray.indexOf(im); if (ii>-1) blockMeshesArray.splice(ii,1); }
          if (getBlockType(10, y, z)) { destroyedBlocks.add(ik); delete worldBlocks[ik]; delete placedBlocks[ik]; activeBlocks.delete(ik); }
        }
        place(10, sy+2, 11, 'fire');
        const portalCount = Object.values(worldBlocks).filter(t => t === 'portal').length;
        log('portal blocks after fire: ' + portalCount);
        if (portalCount !== 6) return done('FAIL: portal count=' + portalCount);
        player.x = 10.5; player.y = sy + 2 + 1.6; player.z = 11.5;
        portalArmed = true;
        checkPortalTouch();
        log('after touch dimension=' + currentDimension);
        if (currentDimension !== 'nether') return done('FAIL: no nether');
        let np = 0, obs = 0;
        for (const k in worldBlocks) {
          const p = k.split(',').map(Number);
          if (p[0] === 3 && p[2] >= 2 && p[2] <= 5 && worldBlocks[k] === 'portal') np++;
          if (p[0] === 3 && worldBlocks[k] === 'obsidian') obs++;
        }
        log('nether portal at x=3: portal=' + np + ' obsidian=' + obs);
        if (np < 6 || obs < 14) return done('FAIL: nether portal incomplete');
        const types = new Set(Object.values(worldBlocks));
        log('nether types: netherrack=' + types.has('netherrack') + ' warped_nylium=' + types.has('warped_nylium') +
            ' warped_stem=' + types.has('warped_stem') + ' warped_leaves=' + types.has('warped_leaves') +
            ' grass=' + types.has('grass') + ' dirt=' + types.has('dirt') +
            ' short_grass=' + types.has('short_grass') + ' poppy=' + types.has('poppy'));
        if (!types.has('netherrack') || !types.has('warped_nylium')) return done('FAIL: nether blocks missing');
        if (types.has('grass') || types.has('dirt')) return done('FAIL: nether has grass/dirt');
        const ores = Object.values(stoneOres);
        log('nether ores gold=' + ores.filter(o=>o==='nether_gold_ore').length + ' quartz=' + ores.filter(o=>o==='quartz_ore').length);
        const sy2 = getSurfaceHeight(3, 3);
        player.x = 3.5; player.y = sy2 + 2 + 1.6; player.z = 3.5;
        portalArmed = true;
        checkPortalTouch();
        log('after return dimension=' + currentDimension);
        if (currentDimension !== 'overworld') return done('FAIL: no return');
        const pc2 = Object.values(worldBlocks).filter(t => t === 'portal').length;
        log('overworld portal blocks: ' + pc2);
        if (pc2 !== 6) return done('FAIL: overworld portal lost');
        done('ALL TESTS PASSED');
      } catch(e){ done('ERROR2: ' + e.message + ' | ' + e.stack); }
    }
  })();
`;
f.onload = () => {
  const iw = f.contentWindow;
  const start = Date.now();
  let injected = false;
  const poll = setInterval(() => {
    try {
      if (!injected) {
        const ready = iw.eval("document.getElementById('main-menu') && document.getElementById('main-menu').style.display === 'flex'");
        if (ready) { injected = true; iw.eval(testCode); }
      } else {
        const r = iw.eval('window.__testResult');
        if (r && r !== 'RUNNING') {
          clearInterval(poll);
          document.getElementById('result').innerText = r;
        }
      }
    } catch(e) {
      clearInterval(poll);
      document.getElementById('result').innerText = 'OUTER ERROR: ' + e.message;
    }
    if (Date.now() - start > 120000) { clearInterval(poll); document.getElementById('result').innerText = 'TIMEOUT outer'; }
  }, 500);
};
</script>
</body>
</html>
