<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>visual</title></head>
<body style="margin:0">
<div id="result">RUNNING</div>
<iframe id="f" src="index.html" style="width:1280px;height:760px;border:0"></iframe>
<script>
const f = document.getElementById('f');
const code = `
  (function(){
    window.__visualDone = 'RUNNING';
    currentWorld = { name:'__v__', type:'random', created:Date.now(), placedBlocks:{}, destroyedBlocks:[],
      playerPos:{x:0,y:1.6,z:0}, playerRot:{yaw:0,pitch:0} };
    worlds.push(currentWorld);
    placedBlocks = {}; destroyedBlocks = new Set();
    player.x = 0; player.y = 1.6; player.z = 0; yaw = 0; pitch = 0;
    enterGame();
    const t0 = Date.now();
    const waitGame = setInterval(() => {
      if (isGameRunning) { clearInterval(waitGame); phase2(); }
      if (Date.now() - t0 > 60000) clearInterval(waitGame);
    }, 200);
    function place(x, y, z, type){
      const key = x+','+y+','+z;
      destroyedBlocks.delete(key);
      placedBlocks[key] = type;
      worldBlocks[key] = type;
      const ck = getChunkKey(x, z);
      if (!chunkBlocks[ck]) chunkBlocks[ck] = new Set();
      chunkBlocks[ck].add(key);
      activeBlocks.add(key);
      createBlockMesh(x, y, z, type);
      if (type === 'fire') { registerFire(x, y, z, key); checkPortalAt(x, y, z); }
    }
    function phase2(){
      const sy = getSurfaceHeight(10, 11);
      for (let z = 10; z <= 13; z++){ place(10, sy+1, z, 'obsidian'); place(10, sy+5, z, 'obsidian'); }
      for (let y = sy+1; y <= sy+5; y++){ place(10, y, 10, 'obsidian'); place(10, y, 13, 'obsidian'); }
      for (let z = 11; z <= 12; z++) for (let y = sy+2; y <= sy+4; y++) {
        const ik = '10,'+y+','+z;
        const im = blockMeshes[ik];
        if (im) { scene.remove(im); delete blockMeshes[ik]; const ii = blockMeshesArray.indexOf(im); if (ii>-1) blockMeshesArray.splice(ii,1); }
        if (getBlockType(10, y, z)) { destroyedBlocks.add(ik); delete worldBlocks[ik]; delete placedBlocks[ik]; activeBlocks.delete(ik); }
      }
      place(10, sy+2, 11, 'fire');
      // 也放一块游离的火看贴图
      place(8, getSurfaceHeight(8, 9)+1, 9, 'fire');
      // 相机对准传送门
      player.x = 15.5; player.y = sy + 3.4; player.z = 11.5;
      yaw = Math.PI/2 + 0.15; pitch = -0.05;
      window.__visualDone = 'OVERWORLD_READY';
      // 5秒后切下界截图
      setTimeout(() => {
        switchDimension('nether');
        player.x = 7.5; player.y = getSurfaceHeight(3,3) + 3.4; player.z = 3.5;
        yaw = Math.PI/2 - 0.2; pitch = -0.05;
        window.__visualDone = 'NETHER_READY';
      }, 5000);
    }
  })();
`;
f.onload = () => {
  const iw = f.contentWindow;
  const start = Date.now();
  let injected = false;
  const poll = setInterval(() => {
    try {
      if (!injected) {
        const ready = iw.eval("document.getElementById('main-menu') && document.getElementById('main-menu').style.display === 'flex'");
        if (ready) { injected = true; iw.eval(code); }
      } else {
        const r = iw.eval('window.__visualDone');
        document.getElementById('result').innerText = r;
      }
    } catch(e) {}
    if (Date.now() - start > 120000) clearInterval(poll);
  }, 500);
};
</script>
</body>
</html>
